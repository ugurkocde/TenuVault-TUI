version: 2

project_name: tenuvault

before:
  hooks:
    - go mod tidy

builds:
  - id: tenuvault
    main: .
    binary: tenuvault
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    # macOS ships Apple Silicon only; Intel Macs can still `go install`.
    ignore:
      - goos: darwin
        goarch: amd64
    ldflags:
      - -s -w -X main.version={{ .Version }}

archives:
  - id: default
    formats:
      - tar.gz
    format_overrides:
      - goos: windows
        formats:
          - zip
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

# macOS Developer ID signing + notarization of the bare binaries (runs anywhere,
# no-ops without secrets). The DMG and PKG installers are built and signed
# separately on the macOS runner (scripts/macos-package.sh) — GoReleaser OSS has
# no DMG/PKG support.
notarize:
  macos:
    - enabled: '{{ if .Env.MACOS_SIGN_P12 }}true{{ else }}false{{ end }}'
      ids:
        - tenuvault
      sign:
        certificate: "{{ .Env.MACOS_SIGN_P12 }}"
        password: "{{ .Env.MACOS_SIGN_PASSWORD }}"
      notarize:
        issuer_id: "{{ .Env.MACOS_NOTARY_ISSUER_ID }}"
        key_id: "{{ .Env.MACOS_NOTARY_KEY_ID }}"
        key: "{{ .Env.MACOS_NOTARY_KEY }}"
        wait: true
        timeout: 30m

# Homebrew tap (cask installs the binary). Skips upload unless a tap token is set.
homebrew_casks:
  - name: tenuvault
    repository:
      owner: ugurkocde
      name: homebrew-UgurLabs
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    homepage: "https://github.com/ugurkocde/TenuVault-TUI"
    description: "Terminal UI for backing up and restoring Microsoft Intune via Microsoft Graph"
    skip_upload: '{{ if .Env.HOMEBREW_TAP_TOKEN }}false{{ else }}true{{ end }}'

# Linux .deb / .rpm packages (apt / dnf). Built by nfpm (pure Go, no system
# tooling needed) and attached to the release.
nfpms:
  - id: tenuvault
    package_name: tenuvault
    ids:
      - tenuvault
    vendor: Ugur Koc
    homepage: "https://github.com/ugurkocde/TenuVault-TUI"
    maintainer: "Ugur Koc <ugurkocde@users.noreply.github.com>"
    description: "Terminal UI for backing up and restoring Microsoft Intune via Microsoft Graph"
    license: MIT
    formats:
      - deb
      - rpm
    bindir: /usr/bin
    file_name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

# Windows winget manifest. Generates the manifest and opens a PR to
# microsoft/winget-pkgs (from your fork). Skips the PR unless WINGET_TOKEN is set.
winget:
  - name: tenuvault
    publisher: UgurLabs
    package_identifier: UgurLabs.TenuVault
    license: MIT
    copyright: "Copyright (c) 2026 Ugur Koc"
    homepage: "https://github.com/ugurkocde/TenuVault-TUI"
    short_description: "Terminal UI for backing up and restoring Microsoft Intune via Microsoft Graph"
    description: |-
      TenuVault TUI backs up, restores, compares, and syncs Microsoft Intune
      configuration via Microsoft Graph, from a single terminal binary.
    skip_upload: '{{ if .Env.WINGET_TOKEN }}false{{ else }}true{{ end }}'
    repository:
      owner: ugurkocde
      name: winget-pkgs
      branch: "tenuvault-{{ .Version }}"
      token: "{{ .Env.WINGET_TOKEN }}"
      pull_request:
        enabled: true
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  draft: false
